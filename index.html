<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COS 211 — Scientific Programming & MATLAB Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #07090f;
  --surface: #0f1520;
  --card: #131c2e;
  --card2: #0e1828;
  --border: #1a2740;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.15);
  --green: #22c55e;
  --green-glow: rgba(34,197,94,0.12);
  --amber: #f59e0b;
  --amber-glow: rgba(245,158,11,0.12);
  --rose: #f43f5e;
  --rose-glow: rgba(244,63,94,0.12);
  --purple: #a855f7;
  --purple-glow: rgba(168,85,247,0.12);
  --cyan: #06b6d4;
  --cyan-glow: rgba(6,182,212,0.12);
  --orange: #f97316;
  --orange-glow: rgba(249,115,22,0.12);
  --text: #e2e8f0;
  --text2: #94a3b8;
  --muted: #475569;
  --code-bg: #060a12;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%, rgba(59,130,246,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 85%, rgba(168,85,247,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(6,182,212,0.02) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* Grid texture */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

.wrapper { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 1.5rem 5rem; }

/* ── HEADER ── */
header {
  padding: 3.5rem 0 3rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
  text-align: center;
  position: relative;
}

.course-tag {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: var(--accent-glow);
  border: 1px solid rgba(59,130,246,0.3);
  color: var(--accent);
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; padding: 0.3rem 0.9rem;
  border-radius: 100px; margin-bottom: 1.4rem;
}

header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  font-weight: 400; line-height: 1.05;
  letter-spacing: -0.01em; margin-bottom: 0.9rem;
  color: #f1f5f9;
}

header h1 em { font-style: italic; color: var(--accent); }

header p { color: var(--text2); font-size: 0.95rem; font-weight: 300; max-width: 480px; margin: 0 auto; line-height: 1.6; }

.header-meta {
  display: flex; justify-content: center; gap: 1.5rem;
  margin-top: 1.5rem; flex-wrap: wrap;
}

.meta-pill {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.4rem 0.8rem;
  font-size: 0.75rem; color: var(--text2); font-weight: 500;
}

/* ── PROGRESS ── */
.progress-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem 1.4rem;
  margin-bottom: 1.8rem;
  display: flex; align-items: center; gap: 1rem;
}

.progress-label { font-size: 0.75rem; color: var(--text2); white-space: nowrap; font-weight: 600; }

.progress-bar-bg {
  flex: 1; height: 5px; background: var(--border);
  border-radius: 100px; overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  border-radius: 100px; transition: width 0.5s ease; width: 0%;
}

.progress-count { font-size: 0.75rem; color: var(--accent); font-weight: 700; white-space: nowrap; }

/* ── NAV ── */
.nav-tabs {
  display: flex; gap: 0.35rem;
  overflow-x: auto; padding-bottom: 0.5rem;
  margin-bottom: 2rem; scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem; font-weight: 600;
  padding: 0.55rem 1rem; border-radius: 8px;
  cursor: pointer; transition: all 0.18s;
  white-space: nowrap;
}

.tab-btn:hover { border-color: var(--accent); color: var(--text); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-btn.done { border-color: var(--green); color: var(--green); }
.tab-btn.done.active { background: var(--green); border-color: var(--green); color: #000; }

/* ── LESSON PANEL ── */
.lesson-panel { display: none; animation: fadeUp 0.28s ease; }
.lesson-panel.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.lesson-header {
  display: flex; align-items: flex-start; gap: 1rem;
  margin-bottom: 1.8rem;
}

.lesson-icon {
  width: 50px; height: 50px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}

.lesson-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.6rem; font-weight: 400;
  letter-spacing: -0.01em; margin-bottom: 0.25rem;
  line-height: 1.2;
}

.lesson-header p { color: var(--text2); font-size: 0.82rem; line-height: 1.5; }

/* ── STEPS ── */
.steps-container { display: flex; flex-direction: column; gap: 0.75rem; }

.step {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.step.revealed { border-color: rgba(59,130,246,0.2); }
.step.revealed:hover { box-shadow: 0 0 0 1px rgba(59,130,246,0.15); }
.step.locked { opacity: 0.35; pointer-events: none; }

.step-header {
  padding: 0.9rem 1.1rem;
  display: flex; align-items: center; gap: 0.75rem;
  cursor: pointer; user-select: none;
}

.step-num {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--border); color: var(--muted);
  font-size: 0.68rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s;
}

.step.revealed .step-num { background: var(--accent); color: #fff; }
.step.open .step-num { box-shadow: 0 0 8px rgba(59,130,246,0.5); }

.step-title { font-size: 0.87rem; font-weight: 600; flex: 1; line-height: 1.3; }
.step-toggle { color: var(--muted); font-size: 0.65rem; transition: transform 0.2s; }
.step.open .step-toggle { transform: rotate(180deg); }

.step-body {
  display: none;
  padding: 0 1.1rem 1.1rem;
  border-top: 1px solid var(--border);
}

.step.open .step-body { display: block; }

.step-text {
  font-size: 0.86rem; line-height: 1.85;
  color: #cbd5e1; padding-top: 0.9rem;
  white-space: pre-wrap;
}

/* ── CODE ── */
pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 8px; padding: 1rem 1.1rem;
  margin: 0.8rem 0; overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; line-height: 1.75;
  color: #93c5fd;
}

pre.pseudo {
  border-left-color: var(--amber);
  color: #fde68a;
}

pre .kw { color: #c084fc; font-weight: 700; }
pre .fn { color: #34d399; }
pre .str { color: #fbbf24; }
pre .cm { color: #374151; font-style: italic; }
pre .num { color: #fb923c; }
pre .op { color: #f472b6; }

/* ── CALLOUTS ── */
.tip, .note, .warn, .exam {
  border-radius: 8px; padding: 0.8rem 1rem;
  font-size: 0.81rem; margin-top: 0.8rem; line-height: 1.65;
}

.tip { background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.2); color: #fcd34d; }
.tip::before { content: '💡 '; }

.note { background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
.note::before { content: '✅ '; }

.warn { background: rgba(244,63,94,0.07); border: 1px solid rgba(244,63,94,0.2); color: #fda4af; }
.warn::before { content: '⚠️ '; }

.exam { background: rgba(168,85,247,0.07); border: 1px solid rgba(168,85,247,0.2); color: #d8b4fe; }
.exam::before { content: '📝 Exam Tip: '; font-weight: 700; }

/* ── TABLE ── */
.info-table {
  width: 100%; border-collapse: collapse;
  margin-top: 0.8rem; font-size: 0.8rem;
}

.info-table th {
  background: rgba(59,130,246,0.1);
  color: var(--accent); text-align: left;
  padding: 0.6rem 0.8rem; font-weight: 700;
  font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

.info-table td {
  padding: 0.55rem 0.8rem; border-bottom: 1px solid var(--border);
  color: #cbd5e1; line-height: 1.5; vertical-align: top;
}

.info-table tr:last-child td { border-bottom: none; }
.info-table tr:hover td { background: rgba(59,130,246,0.04); }

/* ── REVEAL BTN ── */
.reveal-btn {
  display: block; width: 100%; margin-top: 1.3rem;
  padding: 0.8rem;
  background: linear-gradient(135deg, var(--accent), #1d4ed8);
  border: none; border-radius: 10px;
  color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 0.83rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.02em;
}

.reveal-btn:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.3); }
.reveal-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── QUIZ ── */
.quiz-section {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.3rem; margin-top: 1.8rem;
}

.quiz-section h3 {
  font-size: 0.85rem; font-weight: 700;
  margin-bottom: 1rem; color: var(--amber);
  letter-spacing: 0.05em; text-transform: uppercase;
}

.quiz-q { font-size: 0.87rem; color: var(--text); margin-bottom: 0.9rem; line-height: 1.6; font-weight: 500; }

.quiz-options { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 0.8rem; }

.quiz-opt {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.65rem 1rem;
  font-size: 0.82rem; cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif; color: var(--text); text-align: left;
}

.quiz-opt:hover { border-color: var(--accent); background: var(--accent-glow); }
.quiz-opt.correct { border-color: var(--green); background: var(--green-glow); color: #86efac; }
.quiz-opt.wrong { border-color: var(--rose); background: var(--rose-glow); color: #fda4af; }

.quiz-feedback { font-size: 0.81rem; margin-top: 0.4rem; min-height: 1.2rem; line-height: 1.5; }

/* ── SUMMARY ── */
.summary-box {
  background: linear-gradient(135deg, rgba(59,130,246,0.05), rgba(168,85,247,0.05));
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 12px; padding: 1.3rem; margin-top: 1.5rem;
}

.summary-box h3 {
  color: var(--accent); font-size: 0.72rem; font-weight: 700;
  margin-bottom: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase;
}

.summary-list { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }

.summary-list li {
  font-size: 0.83rem; color: #cbd5e1;
  padding-left: 1.1rem; position: relative; line-height: 1.6;
}
.summary-list li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); }

/* ── NEXT BTN ── */
.next-lesson-btn {
  display: none; width: 100%; margin-top: 0.8rem;
  padding: 0.9rem;
  background: linear-gradient(135deg, var(--purple), #7c3aed);
  border: none; border-radius: 10px; color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.87rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
}

.next-lesson-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* ── FLOWCHART ── */
.flowchart {
  margin: 0.8rem 0; display: flex; flex-direction: column; align-items: center; gap: 0;
}

.fc-node {
  border-radius: 8px; padding: 0.6rem 1.4rem;
  font-size: 0.78rem; font-weight: 600; text-align: center;
  font-family: 'JetBrains Mono', monospace;
  min-width: 160px;
}

.fc-terminal { background: rgba(244,63,94,0.15); border: 2px solid var(--rose); color: #fda4af; border-radius: 100px; }
.fc-process { background: rgba(59,130,246,0.12); border: 2px solid var(--accent); color: #93c5fd; }
.fc-io { background: rgba(245,158,11,0.1); border: 2px solid var(--amber); color: #fcd34d; transform: skewX(-8deg); }
.fc-io span { display: inline-block; transform: skewX(8deg); }
.fc-decision { background: rgba(168,85,247,0.1); border: 2px solid var(--purple); color: #d8b4fe; transform: rotate(0deg); border-radius: 4px; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); padding: 1rem 1.8rem; }

.fc-arrow {
  width: 2px; height: 22px; background: var(--border);
  position: relative;
}
.fc-arrow::after {
  content: '▼'; position: absolute; bottom: -6px; left: 50%;
  transform: translateX(-50%); color: var(--muted); font-size: 0.6rem;
}

.fc-branches {
  display: flex; gap: 2rem; align-items: flex-start;
}

.fc-branch { display: flex; flex-direction: column; align-items: center; gap: 0; }
.fc-branch-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 4px; font-weight: 700; }

/* ── STEPS TIMELINE (for algo steps) ── */
.algo-steps { display: flex; flex-direction: column; gap: 0; margin: 0.8rem 0; }
.algo-step {
  display: flex; gap: 0.8rem; align-items: flex-start; padding: 0.7rem 0;
  border-left: 2px solid var(--border); padding-left: 1rem;
  position: relative;
}
.algo-step::before {
  content: attr(data-n);
  position: absolute; left: -10px; top: 0.7rem;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 0.6rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.algo-step-text { font-size: 0.83rem; color: #cbd5e1; line-height: 1.6; padding-top: 0.05rem; }

/* ─────────── RESPONSIVE DESIGN ─────────── */
/* Large screens (1024px and up) */
@media (min-width: 1024px) {
  .wrapper { max-width: 1000px; }
}

/* Tablets (768px to 1023px) */
@media (max-width: 1023px) {
  .wrapper { padding: 0 1.2rem 4rem; max-width: 100%; }
  header h1 { font-size: clamp(2rem, 5vw, 3.2rem); }
  .lesson-header h2 { font-size: 1.4rem; }
  .nav-tabs { gap: 0.25rem; }
  .tab-btn { padding: 0.5rem 0.8rem; font-size: 0.7rem; }
  pre { padding: 0.9rem; font-size: 0.75rem; }
  .info-table { font-size: 0.75rem; }
  .info-table th, .info-table td { padding: 0.5rem 0.6rem; }
  .fc-node { min-width: 120px; padding: 0.5rem 1rem; font-size: 0.72rem; }
  .step-header { padding: 0.75rem 0.9rem; }
  .step-body { padding: 0 0.9rem 0.9rem; }
  .quiz-opt { font-size: 0.78rem; padding: 0.6rem 0.9rem; }
}

/* Mobile (max 767px) */
@media (max-width: 767px) {
  :root { --text: #e2e8f0; }
  
  .wrapper { 
    padding: 0 1rem 3.5rem; 
    max-width: 100%; 
  }
  
  /* Header optimisation */
  header { 
    padding: 2.2rem 0 1.8rem; 
    margin-bottom: 1.5rem; 
  }
  header h1 { 
    font-size: clamp(1.6rem, 7vw, 2.4rem); 
    margin-bottom: 0.7rem; 
  }
  header p { 
    font-size: 0.88rem; 
    line-height: 1.5; 
  }
  
  .course-tag { 
    font-size: 0.62rem; 
    padding: 0.25rem 0.75rem; 
    margin-bottom: 1rem; 
  }
  
  .header-meta { 
    gap: 0.4rem; 
    flex-direction: column; 
    align-items: center; 
  }
  .meta-pill { 
    display: block; 
    width: 100%; 
    text-align: center; 
    padding: 0.35rem 0.6rem; 
    font-size: 0.7rem; 
    border-radius: 6px; 
  }
  
  /* Progress bar */
  .progress-wrap { 
    padding: 0.9rem 1rem; 
    margin-bottom: 1.5rem; 
    gap: 0.7rem; 
    flex-wrap: wrap; 
  }
  .progress-label { 
    font-size: 0.7rem; 
  }
  .progress-count { 
    font-size: 0.7rem; 
  }
  .progress-bar-bg { 
    height: 4px; 
  }
  
  /* Navigation tabs */
  .nav-tabs { 
    gap: 0.2rem; 
    padding-bottom: 0.4rem; 
    margin-bottom: 1.5rem; 
    -webkit-overflow-scrolling: touch; 
  }
  .tab-btn { 
    flex-shrink: 0; 
    padding: 0.5rem 0.7rem; 
    font-size: 0.68rem; 
    border-radius: 6px; 
    min-height: 32px; 
    display: flex; 
    align-items: center; 
  }
  
  /* Lesson panel */
  .lesson-header { 
    gap: 0.8rem; 
    margin-bottom: 1.4rem; 
  }
  .lesson-icon { 
    width: 44px; 
    height: 44px; 
    font-size: 1.2rem; 
    border-radius: 10px; 
  }
  .lesson-header h2 { 
    font-size: clamp(1.3rem, 5vw, 1.5rem); 
    margin-bottom: 0.2rem; 
  }
  .lesson-header p { 
    font-size: 0.78rem; 
  }
  
  /* Steps */
  .steps-container { 
    gap: 0.6rem; 
  }
  .step { 
    border-radius: 10px; 
  }
  .step-header { 
    padding: 0.75rem; 
    gap: 0.6rem; 
  }
  .step-num { 
    width: 24px; 
    height: 24px; 
    font-size: 0.62rem; 
    border-radius: 6px; 
  }
  .step-title { 
    font-size: 0.82rem; 
    line-height: 1.4; 
  }
  .step-toggle { 
    font-size: 0.6rem; 
  }
  .step-body { 
    padding: 0 0.75rem 0.75rem; 
  }
  .step-text { 
    font-size: 0.8rem; 
    line-height: 1.75; 
  }
  
  /* Code blocks */
  pre { 
    padding: 0.8rem; 
    font-size: 0.73rem; 
    line-height: 1.6; 
    border-left-width: 2px; 
    margin: 0.6rem 0; 
    border-radius: 6px; 
    overflow-x: auto; 
    -webkit-overflow-scrolling: touch; 
    word-break: break-word; 
    white-space: pre-wrap; 
  }
  
  /* Tables */
  .info-table { 
    font-size: 0.73rem; 
    margin-top: 0.7rem; 
  }
  .info-table th { 
    padding: 0.5rem; 
    font-size: 0.65rem; 
  }
  .info-table td { 
    padding: 0.45rem; 
    font-size: 0.73rem; 
  }
  .info-table tr:hover td { 
    background: transparent; 
  }
  
  /* Callouts */
  .tip, .note, .warn, .exam { 
    padding: 0.7rem 0.9rem; 
    font-size: 0.76rem; 
    margin-top: 0.7rem; 
  }
  
  /* Flowchart */
  .flowchart { 
    gap: 0; 
  }
  .fc-node { 
    min-width: 100px; 
    padding: 0.5rem 1rem; 
    font-size: 0.7rem; 
  }
  .fc-branches { 
    gap: 1rem; 
  }
  .fc-branch-label { 
    font-size: 0.6rem; 
  }
  
  /* Algorithm steps */
  .algo-steps { 
    margin: 0.7rem 0; 
  }
  .algo-step { 
    padding: 0.6rem 0 0.6rem 0.8rem; 
    padding-left: 0.8rem; 
  }
  .algo-step::before { 
    width: 16px; 
    height: 16px; 
    font-size: 0.55rem; 
    left: -8px; 
  }
  .algo-step-text { 
    font-size: 0.78rem; 
    line-height: 1.5; 
  }
  
  /* Quiz */
  .quiz-section { 
    padding: 1.1rem; 
    margin-top: 1.4rem; 
  }
  .quiz-section h3 { 
    font-size: 0.8rem; 
    margin-bottom: 0.8rem; 
  }
  .quiz-q { 
    font-size: 0.8rem; 
    margin-bottom: 0.8rem; 
    line-height: 1.6; 
  }
  .quiz-options { 
    gap: 0.4rem; 
    margin-bottom: 0.7rem; 
  }
  .quiz-opt { 
    padding: 0.6rem 0.9rem; 
    font-size: 0.76rem; 
    min-height: 36px;

const revealed = {};
lessons.forEach(l => { revealed[l.id] = 0; });

let totalSteps = 0;
lessons.forEach(l => { totalSteps += l.steps.length; });

function countCompleted() {
  let c = 0;
  lessons.forEach(l => { c += revealed[l.id]; });
  return c;
}

function updateProgress() {
  const c = countCompleted();
  const pct = totalSteps ? (c / totalSteps * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = c + ' / ' + totalSteps + ' steps';
}

function renderTabs() {
  const container = document.getElementById('navTabs');
  container.innerHTML = '';
  lessons.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.id = 'tab-' + l.id;
    const words = l.title.split(' ');
    btn.textContent = l.icon + ' ' + words.slice(0, 3).join(' ');
    btn.onclick = () => showLesson(l.id);
    container.appendChild(btn);
  });
}

function buildStepBody(s) {
  let html = '';
  if (s.content) html += `<div class="step-text">${s.content}</div>`;
  if (s.code) {
    const cls = s.isPseudo ? 'pseudo' : '';
    html += `<pre class="${cls}">${s.code}</pre>`;
  }
  if (s.html) html += s.html;
  if (s.tip) html += `<div class="tip">${s.tip.replace(/\n/g,'<br/>')}</div>`;
  if (s.note) html += `<div class="note">${s.note}</div>`;
  if (s.warn) html += `<div class="warn">${s.warn}</div>`;
  if (s.exam) html += `<div class="exam">${s.exam}</div>`;
  return html;
}

function renderLessons() {
  const container = document.getElementById('lessonContainer');
  container.innerHTML = '';

  lessons.forEach(l => {
    const panel = document.createElement('div');
    panel.className = 'lesson-panel';
    panel.id = 'panel-' + l.id;

    const stepsHTML = l.steps.map((s, i) => `
      <div class="step ${i === 0 ? 'revealed open' : 'locked'}" id="step-${l.id}-${i}">
        <div class="step-header" onclick="toggleStep('${l.id}', ${i})">
          <div class="step-num">${i+1}</div>
          <div class="step-title">${s.title}</div>
          <div class="step-toggle">▼</div>
        </div>
        <div class="step-body">${buildStepBody(s)}</div>
      </div>`).join('');

    const q = l.quiz;
    const optsHTML = q.options.map((o, i) =>
      `<button class="quiz-opt" onclick="checkQuiz('${l.id}', ${i})">${o}</button>`
    ).join('');

    panel.innerHTML = `
      <div class="lesson-header">
        <div class="lesson-icon" style="background:${l.color}18;color:${l.color}">${l.icon}</div>
        <div>
          <h2>${l.title}</h2>
          <p>${l.subtitle}</p>
        </div>
      </div>
      <div class="steps-container" id="steps-${l.id}">${stepsHTML}</div>
      <button class="reveal-btn" id="revealBtn-${l.id}" onclick="revealNext('${l.id}')">Unlock Next Step →</button>
      <div class="quiz-section" id="quiz-${l.id}" style="display:none">
        <h3>🧠 Quick Check</h3>
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-options" id="quizOpts-${l.id}">${optsHTML}</div>
        <div class="quiz-feedback" id="quizFeedback-${l.id}"></div>
      </div>
      <div class="summary-box" id="summary-${l.id}" style="display:none">
        <h3>✅ Class Summary</h3>
        <ul class="summary-list">${l.summary.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
      <button class="next-lesson-btn" id="nextBtn-${l.id}" onclick="goNext('${l.id}')">Next Class →</button>`;

    container.appendChild(panel);
  });

  // init state
  lessons.forEach(l => { revealed[l.id] = 1; });
  lessons.forEach(l => updateRevealBtn(l.id));
}

function showLesson(id) {
  document.querySelectorAll('.lesson-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

function toggleStep(lessonId, stepIdx) {
  const step = document.getElementById(`step-${lessonId}-${stepIdx}`);
  if (!step.classList.contains('revealed')) return;
  step.classList.toggle('open');
}

function revealNext(lessonId) {
  const lesson = lessons.find(l => l.id === lessonId);
  const nextIdx = revealed[lessonId];
  if (nextIdx >= lesson.steps.length) return;

  const step = document.getElementById(`step-${lessonId}-${nextIdx}`);
  step.classList.remove('locked');
  step.classList.add('revealed', 'open');

  // close previous steps
  for (let i = 0; i < nextIdx; i++) {
    document.getElementById(`step-${lessonId}-${i}`)?.classList.remove('open');
  }

  revealed[lessonId] = nextIdx + 1;
  updateRevealBtn(lessonId);
  updateProgress();
}

function updateRevealBtn(lessonId) {
  const lesson = lessons.find(l => l.id === lessonId);
  const btn = document.getElementById('revealBtn-' + lessonId);
  const remaining = lesson.steps.length - revealed[lessonId];
  if (remaining <= 0) {
    btn.style.display = 'none';
    document.getElementById('quiz-' + lessonId).style.display = 'block';
  } else {
    btn.textContent = `Unlock Next Step → (${remaining} remaining)`;
  }
}

function checkQuiz(lessonId, chosen) {
  const lesson = lessons.find(l => l.id === lessonId);
  const opts = document.querySelectorAll(`#quizOpts-${lessonId} .quiz-opt`);
  const feedback = document.getElementById('quizFeedback-' + lessonId);
  opts.forEach(o => o.disabled = true);

  if (chosen === lesson.quiz.answer) {
    opts[chosen].classList.add('correct');
    feedback.textContent = lesson.quiz.feedback;
    feedback.style.color = '#86efac';
    document.getElementById('summary-' + lessonId).style.display = 'block';
    const idx = lessons.findIndex(l => l.id === lessonId);
    if (idx < lessons.length - 1) {
      document.getElementById('nextBtn-' + lessonId).style.display = 'block';
    }
    document.getElementById('tab-' + lessonId).classList.add('done');
  } else {
    opts[chosen].classList.add('wrong');
    opts[lesson.quiz.answer].classList.add('correct');
    feedback.textContent = lesson.quiz.wrongFeedback;
    feedback.style.color = '#fda4af';
  }
}

function goNext(currentId) {
  const idx = lessons.findIndex(l => l.id === currentId);
  if (idx < lessons.length - 1) showLesson(lessons[idx + 1].id);
}

    <div class="step-text" style="margin-top:0.9rem"><strong style="color:#93c5fd">Part (a) — Determinants of F, G, H as a new matrix J:</strong>
The determinant of each matrix becomes one element of J. We arrange them as a 1×3 row vector.</div>
    <pre>J = [<span class="fn">det</span>(F), <span class="fn">det</span>(G), <span class="fn">det</span>(H)];</pre>

    <div class="step-text" style="margin-top:0.9rem"><strong style="color:#93c5fd">Part (b) — Transpose of 3rd row of F + 3rd column of G → new matrix K:</strong>
▪ 3rd row of F = F(3,:) → this is a row vector [2, 3, -7]
▪ Transpose of that = F(3,:)' → becomes a column vector
▪ 3rd column of G = G(:,3) → already a column vector [0; 5; 9]
▪ Combine them side by side into matrix K</div>

G .* H means element-wise multiplication (NOT full matrix multiplication).</div>
    <pre>GH = G .* H;             <span class="cm">% element-wise product</span>
inverseGH = <span class="fn">inv</span>(GH);    <span class="cm">% inverse of the result</span>
detGH = <span class="fn">det</span>(GH);        <span class="cm">% determinant of the result</span>
<span class="fn">disp</span>(inverseGH)
<span class="fn">disp</span>(detGH)</pre>

  <div class="step-header" onclick="this.parentElement.classList.toggle('open')">
    <div class="step-num" style="background:var(--purple);color:#fff;min-width:80px;border-radius:8px;font-size:0.7rem">Q3 · Debug</div>
    <div class="step-title">Find and fix ALL errors in the buggy code — then make it do what it's supposed to do.</div>
    <div class="step-toggle">▼</div>
  </div>
  <div class="step-body">
    <div class="step-text"><strong style="color:#d8b4fe">The original (buggy) code:</strong></div>
    <pre style="border-left-color:var(--rose)">sumEven = <span class="num">0</span>;
<span class="kw">for</span> k = <span class="num">10</span>:<span class="num">7</span>:<span class="num">100</span>
    <span class="kw">if</span> <span class="fn">mod</span>(k,<span class="num">7</span>) == <span class="num">0</span>
        m = <span class="num">1</span>/k;
        sumEven = m;        <span class="cm">% ← BUG HERE</span>
    <span class="kw">end</span>
<span class="kw">end</span>
sumEven</pre>

    <div class="step-text" style="margin-top:0.9rem"><strong style="color:#d8b4fe">Step 1 — Understand what it SHOULD do:</strong>
The task says: find the inverse of the SUM of all odd numbers that are NOT divisible by 3 BUT ARE divisible by 7, between -100 to 10.

Let's decode that carefully:
▪ Range: -100 to 10 (not 10 to 100)
▪ Numbers must be: odd AND divisible by 7 AND NOT divisible by 3
▪ Find their sum, then take the inverse (1/sum)</div>

    <div class="step-text" style="margin-top:0.9rem"><strong style="color:#d8b4fe">Step 2 — List ALL the bugs:</strong></div>
    <table class="info-table" style="margin-top:0.5rem">
      <tr><th>#</th><th>Bug Found</th><th>Why It's Wrong</th><th>Fix</th></tr>
      <tr><td>1</td><td><code>for k = 10:7:100</code></td><td>Range is wrong — should be -100 to 10, not 10 to 100. Also step of 7 pre-filters — we should check all numbers.</td><td><code>for k = -100:10</code></td></tr>
      <tr><td>2</td><td><code>if mod(k,7) == 0</code></td><td>Only checks divisibility by 7. Missing: must also be ODD and NOT divisible by 3</td><td><code>if mod(k,2) ~= 0 && mod(k,7) == 0 && mod(k,3) ~= 0</code></td></tr>
      <tr><td>3</td><td><code>sumEven = m</code></td><td>This REPLACES sumEven with m each iteration — it never accumulates. Should ADD m to sumEven</td><td><code>sumEven = sumEven + m</code></td></tr>
      <tr><td>4</td><td>Variable name <code>sumEven</code></td><td>Misleading name — we are summing ODD numbers, not even ones</td><td>Rename to <code>sumOdd</code></td></tr>
      <tr><td>5</td><td>Final answer</td><td>The task asks for the INVERSE of the sum (1/sum), but code just displays the sum</td><td>Add <code>result = 1/sumOdd; disp(result)</code></td></tr>
    </table>

    <div class="step-text" style="margin-top:0.9rem"><strong style="color:#d8b4fe">Step 3 — The fully corrected code:</strong></div>
    <pre>sumOdd = <span class="num">0</span>;
<span class="kw">for</span> k = -<span class="num">100</span>:<span class="num">10</span>
    <span class="kw">if</span> <span class="fn">mod</span>(k,<span class="num">2</span>) ~= <span class="num">0</span> && <span class="fn">mod</span>(k,<span class="num">7</span>) == <span class="num">0</span> && <span class="fn">mod</span>(k,<span class="num">3</span>) ~= <span class="num">0</span>
        sumOdd = sumOdd + (<span class="num">1</span>/k);
    <span class="kw">end</span>
<span class="kw">end</span>
result = <span class="num">1</span> / sumOdd;
<span class="fn">disp</span>(result)</pre>

    <div class="step-text" style="margin-top:0.9rem"><strong style="color:#d8b4fe">Step 4 — Trace through to verify (which numbers qualify?):</strong>
Odd numbers in -100 to 10, divisible by 7, NOT divisible by 3:
▪ -77: odd ✅ | div by 7 ✅ | div by 3? (-77/3 = -25.67) ✅ not divisible → QUALIFIES
▪ -49: odd ✅ | div by 7 ✅ | div by 3? no ✅ → QUALIFIES
▪ -7: odd ✅ | div by 7 ✅ | div by 3? no ✅ → QUALIFIES
▪ 7: odd ✅ | div by 7 ✅ | div by 3? no ✅ → QUALIFIES
▪ -21: div by 7 ✅ but also div by 3 ❌ → does NOT qualify
▪ -63: div by 7 ✅ but also div by 3 ❌ → does NOT qualify</div>
    <div class="exam">Debugging questions are high-value in this course. Always: (1) read what the code SHOULD do, (2) trace what it ACTUALLY does, (3) list every bug explicitly, (4) write the corrected code.</div>
