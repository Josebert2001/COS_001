<style>

<script>
// ════════════════════════════════════════════════
// LESSONS DATA
// ════════════════════════════════════════════════
const lessons = [
{
  id:'intro',icon:'🔬',color:'#3b82f6',
  title:'Intro to Scientific Programming',
  subtitle:'COS 211 — problem-solving steps, data types, and programming errors',
  steps:[
    {title:'What is Scientific Programming?',
     content:'Scientific programming is the use of programming languages to solve scientific and mathematical problems.\n\nCOS 211 teaches you to think like a programmer — structure your thinking BEFORE touching a keyboard.'},
    {title:'The 5 Steps to Solving Scientific Problems',
     content:'Every time you face a scientific problem, follow these 5 steps in order:',
     html:`<div class="algo-steps">
       <div class="algo-step" data-n="1"><div class="algo-step-text"><strong>Problem Identification</strong> — Identify and analyse the problem. What exactly is being asked?</div></div>
       <div class="algo-step" data-n="2"><div class="algo-step-text"><strong>Algorithm Design</strong> — Create a flowchart to design the solution visually before coding.</div></div>
       <div class="algo-step" data-n="3"><div class="algo-step-text"><strong>Mathematical Model</strong> — Express the solution using natural language or pseudocode.</div></div>
       <div class="algo-step" data-n="4"><div class="algo-step-text"><strong>Implementation</strong> — Code the solution in MATLAB (or another language).</div></div>
       <div class="algo-step" data-n="5"><div class="algo-step-text"><strong>Testing &amp; Validation</strong> — Run with known inputs, verify correct output.</div></div>
     </div>`,
     exam:'Exams often ask you to list the steps of solving a scientific problem. Know all 5 in order.'},
    {title:'Data Types',
     content:'Data is any value used in programming. Types your course covers:',
     html:`<table class="info-table">
       <tr><th>Type</th><th>Description</th><th>Example</th></tr>
       <tr><td>Integer</td><td>Whole numbers</td><td>5, -3, 100</td></tr>
       <tr><td>Float / Double</td><td>Decimal numbers</td><td>3.14, -0.5</td></tr>
       <tr><td>String</td><td>Text in quotes</td><td>'Hello', 'Ada'</td></tr>
       <tr><td>Boolean</td><td>True or False only</td><td>true, false</td></tr>
       <tr><td>Char</td><td>Single character</td><td>'A', 'z'</td></tr>
     </table>`,
     tip:'MATLAB uses implicit data typing — it figures out the type automatically.'},
    {title:'Variables, Keywords & Errors',
     content:'Variable: A placeholder whose value can change during execution.\nKeyword: A reserved word with a pre-defined meaning — cannot be used as a variable name.',
     html:`<table class="info-table">
       <tr><th>Error Type</th><th>When it Happens</th><th>MATLAB Example</th></tr>
       <tr><td><strong>Syntax / Compilation</strong></td><td>Code breaks language rules</td><td>Writing <code>fore i=1:5</code> instead of <code>for</code></td></tr>
       <tr><td><strong>Logical / Semantic</strong></td><td>Runs but gives wrong answer</td><td>Using + instead of *</td></tr>
       <tr><td><strong>Run-time</strong></td><td>Illegal operation during execution</td><td>Division by zero: <code>x = 5/0</code></td></tr>
     </table>`,

{
  id:'algorithms',icon:'🧠',color:'#a855f7',
  title:'Algorithms & Pseudocode',
  subtitle:'Design your solution on paper before writing a single line of code',
  steps:[
    {title:'What is an Algorithm?',
     content:'An algorithm is a step-by-step procedure or rule set to solve a particular problem.\n\nThink of it like a recipe — tells you exactly what to do and in what order.\n\nUsed in: Computing, Artificial Intelligence, Cybersecurity, and Mathematics.'},
    {title:'Characteristics of a Good Algorithm',
     html:`<table class="info-table">
       <tr><th>Property</th><th>What it means</th></tr>
       <tr><td>Unambiguous</td><td>Every step is clear — no room for confusion</td></tr>
       <tr><td>Ordered</td><td>Steps must follow a definite sequence</td></tr>
       <tr><td>Finite</td><td>Must terminate — cannot run forever</td></tr>
       <tr><td>Effective</td><td>Each step must be achievable and practical</td></tr>
       <tr><td>Has Input/Output</td><td>Takes zero or more inputs, produces at least one output</td></tr>
       <tr><td>Deterministic</td><td>Same input always gives the same output</td></tr>
     </table>`,
     exam:'A favourite exam question: "List and explain the characteristics of a good algorithm."'},
    {title:'Well-Structured vs Poorly-Structured',
     content:'Your lecturer stressed this difference:',
     html:`<div class="two-col">
       <div class="col-box" style="background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2)">
         <div class="col-box-title" style="color:#fda4af">❌ POORLY STRUCTURED</div>
         <ul><li>Read A, B, C</li><li>Sum = A+B+C</li><li>Print Sum</li></ul>
         <div style="font-size:.75rem;color:var(--muted);margin-top:.5rem">No constraint checks</div>
       </div>
       <div class="col-box" style="background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2)">
         <div class="col-box-title" style="color:#86efac">✅ WELL STRUCTURED</div>
         <ul><li>Read A, B, C</li><li>Ensure A,B,C ≥ 0</li><li>Sum = A+B+C</li><li>Print Sum</li></ul>
         <div style="font-size:.75rem;color:var(--muted);margin-top:.5rem">Includes constraint check</div>
       </div>
     </div>`,
     tip:'Always add constraint checks in your algorithms — this separates a good answer from a great one.'},
    {title:'Pseudocode — Even/Odd Example',
     content:'Pseudocode is written in plain English — shows logic without strict syntax.',
     code:`START\n  READ NUM\n  IF NUM MOD 2 == 0 THEN\n     PRINT "NUM IS EVEN"\n  ELSE\n     PRINT "NUM IS ODD"\n  END IF\nSTOP`,
     isPseudo:true,
     tip:'MOD is the modulus operator — gives the remainder after division. 10 MOD 2 = 0 (even). 7 MOD 2 = 1 (odd).'},
    {title:'Flowchart Symbols',
     html:`<table class="info-table">
       <tr><th>Symbol</th><th>Shape</th><th>Meaning</th></tr>
       <tr><td>Terminal</td><td>Oval / Rounded rect</td><td>START or STOP</td></tr>
       <tr><td>Process</td><td>Rectangle</td><td>Calculation or action</td></tr>
       <tr><td>Input / Output</td><td>Parallelogram</td><td>READ or PRINT</td></tr>
       <tr><td>Decision</td><td>Diamond</td><td>YES/NO condition</td></tr>
       <tr><td>Flow line</td><td>Arrow</td><td>Direction of flow</td></tr>

  summary:['Algorithm = step-by-step procedure to solve a problem','Must be: unambiguous, ordered, finite, effective, deterministic','Well-structured algorithms include constraint checks','Pseudocode uses plain English — no strict syntax','5 flowchart symbols: Oval, Rectangle, Parallelogram, Diamond, Arrow'],
},

{
  id:'matrices',icon:'📐',color:'#f97316',
  title:'Arrays & Matrices',
  subtitle:"MATLAB's core feature — everything is stored as a matrix",
  steps:[
    {title:'Arrays in MATLAB',
     content:'Arrays can be 1D (a list) or 2D (a grid). MATLAB counts from 1, not 0.',
     code:`x = [<span class="num">3</span>, <span class="num">2</span>, <span class="num">9</span>, <span class="num">11</span>];  <span class="cm">% from your lecture notes</span>\nx(<span class="num">1</span>)   <span class="cm">% → 3  (first element)</span>\nx(<span class="num">3</span>)   <span class="cm">% → 9  (third element)</span>`,
     warn:'MATLAB starts counting at 1, NOT 0. This is one of the most common exam mistakes.'},
    {title:'Creating Vectors & Matrices',
     code:`<span class="cm">% Row vector (comma = same row)</span>\na = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>]\n\n<span class="cm">% Column vector (semicolon = new row)</span>\nb = [<span class="num">1</span>; <span class="num">2</span>; <span class="num">3</span>; <span class="num">4</span>]\n\n<span class="cm">% Matrix from lecture notes</span>\nA = [<span class="num">2</span>,<span class="num">4</span>,<span class="num">1</span>; -<span class="num">3</span>,<span class="num">3</span>,<span class="num">2</span>; <span class="num">2</span>,<span class="num">8</span>,<span class="num">1</span>]`,
     tip:'Comma = same row. Semicolon = new row. This rule applies everywhere in MATLAB.'},
    {title:'Accessing & Slicing',
     code:`A(<span class="num">1</span>,<span class="num">1</span>)   <span class="cm">% row 1, col 1 → 2</span>\nA(<span class="num">2</span>,<span class="num">3</span>)   <span class="cm">% row 2, col 3 → 2</span>\nA(:, :)  <span class="cm">% all rows, all columns</span>\nA(:, <span class="num">1</span>)  <span class="cm">% all rows, column 1 only</span>\nA(<span class="num">1</span>, :)  <span class="cm">% row 1 only, all columns</span>`,
     note:'A(:,:) from your lecture notes means the ENTIRE matrix — all rows and all columns.'},
    {title:'Matrix Operations from Your Notes',
     code:`<span class="fn">size</span>(A)        <span class="cm">% dimensions</span>\n<span class="fn">det</span>(A)         <span class="cm">% determinant</span>\n<span class="fn">inv</span>(A)         <span class="cm">% inverse</span>\n<span class="fn">transpose</span>(B)   <span class="cm">% transpose (same as B')</span>\nA .* A         <span class="cm">% element-wise multiply</span>\nA * A          <span class="cm">% full matrix multiply</span>\n<span class="fn">mean</span>(A)        <span class="cm">% average</span>\n<span class="fn">max</span>(A)         <span class="cm">% maximum value</span>\n<span class="fn">zeros</span>(<span class="num">3</span>)       <span class="cm">% 3×3 matrix of zeros</span>`,
     tip:'.* means element-wise (each element × corresponding element). * is full matrix multiplication. They give very different results.'},
  ],
  quiz:{q:'In matrix A = [2,4,1; -3,3,2; 2,8,1], what does A(2,3) return?',options:['3','2','8','-3'],answer:1,feedback:'✅ Correct! Row 2 is [-3,3,2]. Column 3 of that row is 2.',wrongFeedback:'❌ Not quite. A(row, col) — row 2 is [-3,3,2], column 3 = 2.'},
  summary:['Arrays: 1D (vector) or 2D (matrix)','Comma = same row, Semicolon = new row in [ ]','MATLAB counts from 1, not 0','Access: A(row,col) — Slice: A(:,1) = all rows col 1','Operations: det(), inv(), transpose(), size(), zeros()','Use .* for element-wise, * for full matrix multiply'],
},
{
  id:'loops',icon:'🔁',color:'#22c55e',

     code:`<span class="cm">% Basic: numbers 1 to 10</span>\n<span class="kw">for</span> i = <span class="num">1</span>:<span class="num">10</span>\n   <span class="fn">disp</span>(i)\n<span class="kw">end</span>\n\n<span class="cm">% With step: even numbers (from lecture notes)</span>\n<span class="kw">for</span> evenNum = <span class="num">2</span>:<span class="num">2</span>:<span class="num">20</span>\n   <span class="fn">disp</span>(evenNum)\n<span class="kw">end</span>`,

     code:`sumSeries = <span class="num">0</span>;           <span class="cm">% initialise accumulator</span>\n<span class="kw">for</span> i = <span class="num">1</span>:<span class="num">5</span>\n   sumSeries = sumSeries + (<span class="num">1</span> / i^<span class="num">2</span>);\n<span class="kw">end</span>\n<span class="fn">disp</span>(sumSeries)`,

},

{
  id:'functions',icon:'🔧',color:'#f43f5e',
  title:'Functions',
  subtitle:'Built-ins, creating your own, multiple outputs, and tracing logic',
  steps:[
    {title:'What is a Function?',
     content:'From your notes: Functions are blocks of code that perform a particular task, requiring input and output.\n\nTwo types:\n▪ Parameterized — takes input values\n▪ Non-parameterized — no inputs needed\n\nAll functions must start with the function keyword and end with end.'},
    {title:'Built-in Functions from Your Notes',
     code:`<span class="fn">sin</span>(x)    <span class="cm">% sine</span>\n<span class="fn">cos</span>(x)    <span class="cm">% cosine</span>\n<span class="fn">abs</span>(x)    <span class="cm">% absolute value</span>\n<span class="fn">mod</span>(a,b)  <span class="cm">% remainder</span>\n<span class="fn">sqrt</span>(x)   <span class="cm">% square root</span>\n<span class="fn">sum</span>(v)    <span class="cm">% total of all elements</span>\n<span class="fn">mean</span>(v)   <span class="cm">% average</span>\n<span class="fn">max</span>(v)    <span class="cm">% largest value</span>\n<span class="fn">min</span>(v)    <span class="cm">% smallest value</span>\n<span class="fn">det</span>(A)    <span class="cm">% determinant</span>\n<span class="fn">inv</span>(A)    <span class="cm">% inverse</span>\n<span class="fn">rats</span>(x)   <span class="cm">% decimal to fraction</span>`,
     note:'These are already built into MATLAB. Just call them — no need to write them yourself.'},
    {title:'Structure of a Function',
     code:`<span class="kw">function</span> output = funcName(input)\n    <span class="cm">% code goes here</span>\n    output = input * <span class="num">2</span>;\n<span class="kw">end</span>`,
     tip:'▪ function → required keyword\n▪ output → the variable that gets returned\n▪ funcName → what you call it by\n▪ input → value(s) passed in\n▪ end → closes the function'},
    {title:'🛠 Create Your Own — 4-Step Process',
     content:'Every time you write a function:\n\n1️⃣  DECIDE what it should do\n2️⃣  CHOOSE a clear name\n3️⃣  IDENTIFY the inputs and output\n4️⃣  WRITE the logic inside',
     tip:'Ask yourself: "What goes IN? What comes OUT?" — answer those two questions first.'},
    {title:'🛠 Build It: Celsius to Fahrenheit',
     content:'Task: Convert Celsius to Fahrenheit. Formula: F = (C × 9/5) + 32',
     code:`<span class="kw">function</span> f = celsiusToFahr(c)\n    f = (c * <span class="num">9</span>/<span class="num">5</span>) + <span class="num">32</span>;\n<span class="kw">end</span>\n\n<span class="cm">% Testing:</span>\ncelsiusToFahr(<span class="num">0</span>)    <span class="cm">% → 32  (freezing)</span>\ncelsiusToFahr(<span class="num">100</span>)  <span class="cm">% → 212 (boiling)</span>`,
     note:'Always test with values whose answers you already know — like 0°C = 32°F.'},
    {title:'🛠 Multiple Inputs & Multiple Outputs',
     code:`<span class="cm">% Multiple inputs</span>\n<span class="kw">function</span> result = addTwo(a, b)\n    result = a + b;\n<span class="kw">end</span>\n\n<span class="cm">% Multiple outputs</span>\n<span class="kw">function</span> [total, avg] = sumAndAvg(v)\n    total = <span class="fn">sum</span>(v);\n    avg = <span class="fn">mean</span>(v);\n<span class="kw">end</span>\n[t, a] = sumAndAvg([<span class="num">10</span>,<span class="num">20</span>,<span class="num">30</span>]); <span class="cm">% t=60, a=20</span>`,
     tip:'Multiple outputs are wrapped in [ ]. The order must match the function definition.'},
    {title:'🛠 Function with Condition Inside',
     code:`<span class="kw">function</span> grade = getGrade(score)\n    <span class="kw">if</span> score >= <span class="num">70</span>\n        grade = <span class="str">'A'</span>;\n    <span class="kw">elseif</span> score >= <span class="num">50</span>\n        grade = <span class="str">'B'</span>;\n    <span class="kw">else</span>\n        grade = <span class="str">'F'</span>;\n    <span class="kw">end</span>\n<span class="kw">end</span>\ngetGrade(<span class="num">85</span>)  <span class="cm">% → 'A'</span>`},
    {title:'Tracing a Function in Exams',
     content:'When asked "what does this function return?":\n\n1️⃣  Find the INPUT value passed in\n2️⃣  Substitute it into the formula\n3️⃣  Follow the logic line by line\n4️⃣  Read the OUTPUT variable at the end',
     code:`<span class="kw">function</span> y = mystery(x)\n    y = x * <span class="num">2</span> + <span class="num">1</span>;\n<span class="kw">end</span>\n<span class="cm">% mystery(5) → y = 5×2+1 = 11 ✅</span>`,
     tip:'Write the substitution on paper during exams — show each step.'},
  ],

// ENGINE
// ════════════════════════════════════════════════
const revealedSteps = {};
lessons.forEach(l => { revealedSteps[l.id] = 0; });

function getTotalSteps(){
  let t=0; lessons.forEach(l => t+=l.steps.length); return t;
}
function getCompletedSteps(){
  let c=0; lessons.forEach(l => c+=revealedSteps[l.id]); return c;
}
function updateProgress(){
  const total=getTotalSteps(), done=getCompletedSteps();
  document.getElementById('progressFill').style.width=(total?done/total*100:0)+'%';
  document.getElementById('progressCount').textContent=done+' / '+total+' steps';
}

function buildStepBodyHTML(s){
  let h='';
  if(s.content) h+=`<div class="step-text">${s.content}</div>`;
  if(s.code){
    const cls=s.isPseudo?'pseudo':'';
    h+=`<pre class="${cls}">${s.code}</pre>`;
  }
  if(s.html) h+=s.html;
  if(s.tip) h+=`<div class="tip">${s.tip.replace(/\n/g,'<br>')}</div>`;
  if(s.note) h+=`<div class="note">${s.note}</div>`;
  if(s.warn) h+=`<div class="warn">${s.warn}</div>`;
  if(s.exam) h+=`<div class="exam">${s.exam}</div>`;
  return h;
}

function renderTabs(){
  const el=document.getElementById('navTabs');
  lessons.forEach(l=>{
    const b=document.createElement('button');
    b.className='tab-btn'; b.id='tab-'+l.id;
    const words=l.title.split(' ');
    b.textContent=l.icon+' '+words.slice(0,3).join(' ');
    b.onclick=()=>showLesson(l.id);
    el.appendChild(b);
  });
  // Past questions tab
  const pq=document.createElement('button');
  pq.className='tab-btn pq-tab'; pq.id='tab-pastq';
  pq.textContent='📋 Past Questions';
  pq.onclick=()=>showPanel('pastq');
  el.appendChild(pq);
}

function renderLessons(){
  const lc=document.getElementById('lessonContainer');
  lessons.forEach(l=>{
    const panel=document.createElement('div');
    panel.className='lesson-panel'; panel.id='panel-'+l.id;

    const stepsHTML=l.steps.map((s,i)=>`
      <div class="step ${i===0?'revealed open':'locked'}" id="step-${l.id}-${i}">
        <div class="step-header" onclick="toggleStep('${l.id}',${i})">
          <div class="step-num">${i+1}</div>
          <div class="step-title">${s.title}</div>
          <div class="step-toggle">▼</div>
        </div>
        <div class="step-body">${buildStepBodyHTML(s)}</div>
      </div>`).join('');

    const q=l.quiz;
    const opts=q.options.map((o,i)=>
      `<button class="quiz-opt" onclick="checkQuiz('${l.id}',${i})">${o}</button>`).join('');

    panel.innerHTML=`
      <div class="lesson-header">
        <div class="lesson-icon" style="background:${l.color}18;color:${l.color}">${l.icon}</div>
        <div><h2>${l.title}</h2><p>${l.subtitle}</p></div>
      </div>
      <div class="steps-container" id="steps-${l.id}">${stepsHTML}</div>
      <button class="reveal-btn" id="revealBtn-${l.id}" onclick="revealNext('${l.id}')">Unlock Next Step →</button>
      <div class="quiz-section" id="quiz-${l.id}" style="display:none">
        <h3>🧠 Quick Check</h3>
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-options" id="quizOpts-${l.id}">${opts}</div>
        <div class="quiz-feedback" id="quizFeedback-${l.id}"></div>
      </div>
      <div class="summary-box" id="summary-${l.id}" style="display:none">
        <h3>✅ Class Summary</h3>
        <ul class="summary-list">${l.summary.map(s=>`<li>${s}</li>`).join('')}</ul>
      </div>
      <button class="next-lesson-btn" id="nextBtn-${l.id}" onclick="goNext('${l.id}')">Next Class →</button>`;
    lc.appendChild(panel);
  });
  lessons.forEach(l=>{ revealedSteps[l.id]=1; updateRevealBtn(l.id); });
}

function renderPastQuestions(){
  const lc=document.getElementById('lessonContainer');
  const panel=document.createElement('div');
  panel.className='lesson-panel'; panel.id='panel-pastq';

  let html=`<div class="lesson-header">
    <div class="lesson-icon" style="background:#f59e0b18;color:#f59e0b">📋</div>
    <div><h2>Past Examination Questions</h2><p>2021/2022 &amp; 2022/2023 — with full step-by-step solutions. Click any question to expand.</p></div>
  </div>`;

  pastQuestions.forEach(session=>{
    const isV2=session.session.includes('2022/2023');
    html+=`<div class="pq-section-label ${isV2?'v2':''}">📅 ${session.session}</div>`;
    session.questions.forEach((q,i)=>{
      html+=`
        <div class="pq-card" id="pqcard-${session.session.replace(/\//g,'')}-${i}">
          <div class="pq-card-header" onclick="togglePQ(this)">
            <span class="pq-badge" style="background:${session.color}20;color:${session.color};border:1px solid ${session.color}40">${q.badge}</span>
            <span class="pq-card-title">${q.title}</span>
            <span class="pq-toggle">▼</span>
          </div>
          <div class="pq-card-body">${q.body}</div>
        </div>`;
    });
  });

  html+=`<div class="exam-pattern">
    <h3>🎯 Exam Pattern — What Repeats Every Year</h3>
    <ul class="summary-list">
      <li>Error types (Q1 2021) — appears in almost every session. Know all 3 with examples.</li>
      <li>Algorithm + flowchart (Q2 2021, Q1 2022) — always a real-world scenario. Include constraint checks.</li>
      <li>Math translation (Q3 2021) — know sqrt(), ^(1/n), tan(), pi, and explicit * for multiplication.</li>
      <li>Loop programs (Q4 2021) — always involves an accumulator. SUM=0, PRODUCT=1.</li>
      <li>Grading programs (Q5 2021) — order conditions HIGHEST to LOWEST.</li>
      <li>Matrix operations (Q6 2021) — combines det(), inv(), transpose, slicing, .* vs *.</li>
      <li>Variable name classification (Q2b 2022) — know the 5 naming rules cold.</li>
      <li>Debugging (Q3 2022) — read intent → list all bugs → fix → verify with examples.</li>
    </ul>
  </div>`;

  panel.innerHTML=html;
  lc.appendChild(panel);
}

function togglePQ(header){
  const card=header.parentElement;
  card.classList.toggle('open');
}

function showPanel(id){
  document.querySelectorAll('.lesson-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

function showLesson(id){showPanel(id);}

function toggleStep(lessonId,stepIdx){
  const step=document.getElementById(`step-${lessonId}-${stepIdx}`);
  if(!step.classList.contains('revealed')) return;
  step.classList.toggle('open');
}

function revealNext(lessonId){
  const lesson=lessons.find(l=>l.id===lessonId);
  const next=revealedSteps[lessonId];
  if(next>=lesson.steps.length) return;
  const step=document.getElementById(`step-${lessonId}-${next}`);
  step.classList.remove('locked');
  step.classList.add('revealed','open');
  for(let i=0;i<next;i++) document.getElementById(`step-${lessonId}-${i}`)?.classList.remove('open');
  revealedSteps[lessonId]=next+1;
  updateRevealBtn(lessonId);
  updateProgress();
}

function updateRevealBtn(lessonId){
  const lesson=lessons.find(l=>l.id===lessonId);
  const btn=document.getElementById('revealBtn-'+lessonId);
  const rem=lesson.steps.length-revealedSteps[lessonId];
  if(rem<=0){
    btn.style.display='none';
    document.getElementById('quiz-'+lessonId).style.display='block';
  } else {
    btn.textContent=`Unlock Next Step → (${rem} remaining)`;
  }
}

function checkQuiz(lessonId,chosen){
  const lesson=lessons.find(l=>l.id===lessonId);
  const opts=document.querySelectorAll(`#quizOpts-${lessonId} .quiz-opt`);
  const fb=document.getElementById('quizFeedback-'+lessonId);
  opts.forEach(o=>o.disabled=true);
  if(chosen===lesson.quiz.answer){
    opts[chosen].classList.add('correct');
    fb.textContent=lesson.quiz.feedback; fb.style.color='#86efac';
    document.getElementById('summary-'+lessonId).style.display='block';
    const idx=lessons.findIndex(l=>l.id===lessonId);
    if(idx<lessons.length-1) document.getElementById('nextBtn-'+lessonId).style.display='block';
    document.getElementById('tab-'+lessonId).classList.add('done');
  } else {
    opts[chosen].classList.add('wrong');
    opts[lesson.quiz.answer].classList.add('correct');
    fb.textContent=lesson.quiz.wrongFeedback; fb.style.color='#fda4af';
  }
}

function goNext(id){
  const idx=lessons.findIndex(l=>l.id===id);
  if(idx<lessons.length-1) showLesson(lessons[idx+1].id);
}

// Boot
renderTabs();
renderLessons();
renderPastQuestions();
showLesson(lessons[0].id);
updateProgress();
</script>
</body>
</html>
